<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add MCQs</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f5f7fa;
            padding: 30px;
            max-width: 1000px;
            margin: auto;
        }
        h1 {
            text-align: center;
            margin-bottom: 30px;
        }

        textarea {
            width: 100%;
            min-height: 400px;
            padding: 15px;
            font-size: 16px;
            margin-top: 15px;
            border-radius: 10px;
            border: 1px solid #ccc;
        }

        select {
            width: 100%;
            padding: 12px;
            font-size: 16px;
            margin-bottom: 20px;
            border-radius: 10px;
        }
        button {
            width: 100%;
            padding: 15px;
            background: #3498db;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            cursor: pointer;
            margin-top: 20px;
        }

        button:hover {
            background: #2980b9;
        }

        .example {
            background: white;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            line-height: 1.7;
        }
    </style>
</head>
<body>

<h1>Add Multiple MCQs</h1>

<div class="example">
    <h3>Supported Format</h3>

<pre>
What is 2 + 2?
A) 3
B) 4
C) 5
D) 6
Answer: B
Explanation: 2 + 2 = 4.

What is the capital of India?
A) Mumbai
B) Kolkata
C) Delhi
D) Chennai
Answer: C
Explanation: Delhi is the capital of India.
</pre>
</div>

<select id="subject">
    <option value="mathematics">Mathematics</option>
    <option value="english">English</option>
    <option value="general-science">General Science</option>
    <option value="history">History</option>
    <option value="geography">Geography</option>
    <option value="indian-polity">Indian Polity</option>
    <option value="economics">Economics</option>
    <option value="reasoning">Reasoning</option>
    <option value="computer-knowledge">Computer Knowledge</option>
    <option value="current-affairs">Current Affairs</option>
    <option value="general-awareness">General Awareness</option>
    <option value="quantitative-aptitude">Quantitative Aptitude</option>
</select>

<textarea id="mcqs" placeholder="Paste MCQs here..."></textarea>

<button onclick="submitMCQs()">Save MCQs</button>

<script>
async function submitMCQs() {

    const subject = document.getElementById("subject").value;
    const raw = document.getElementById("mcqs").value;

    const response = await fetch("/api/add-bulk-mcqs", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            subject,
            raw
        })
    });

    const result = await response.json();

    alert(result.message || result.error);
}
</script>

</body>
</html>
