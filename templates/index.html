<!DOCTYPE html>
<html>
<head>
    <title>SSC CGL MCQs</title>

    <style>
        body {
            font-family: Arial;
            margin: 40px;
            background-color: #f4f4f4;
        }

        .mcq {
            background: white;
            padding: 20px;
            margin-bottom: 20px;
            border-radius: 10px;
        }

        h2 {
            color: #333;
        }

        ul {
            list-style-type: none;
            padding: 0;
        }

        li {
            margin: 8px 0;
        }

        .answer {
            color: green;
            font-weight: bold;
        }

        .description {
            margin-top: 10px;
            color: #555;
        }
    </style>
</head>

<body>

<h1>SSC CGL MCQs</h1>
<div style="margin-bottom: 20px;">

    <a href="/">
        <button>All</button>
    </a>

    <a href="/?subject=Algebra">
        <button>Algebra</button>
    </a>

    <a href="/?subject=Trigonometry">
        <button>Trigonometry</button>
    </a>

    <a href="/?subject=History">
        <button>History</button>
    </a>

    <a href="/?subject=Geography">
        <button>Geography</button>
    </a>

    <a href="/?subject=Geometry">
        <button>Geometry</button>
    </a>

    <a href="/?subject=Affairs">
        <button>Affairs</button>
    </a>

    <a href="/?subject=Polity">
        <button>Polity</button>
    </a>

    <a href="/?subject=English">
        <button>English</button>
    </a>

    <a href="/?subject=Number_system">
        <button>Number_system</button>
    </a>

    <a href="/?subject=FOA">
        <button>FOA</button>
    </a>

    <a href="/?subject=Mensuration">
        <button>Mensuration</button>
    </a>

    <a href="/?subject=Stats_prob">
        <button>Stats_prob</button>
    </a>

    <a href="/?subject=Computers">
        <button>Computers</button>
    </a>

</div>


<a href="/add">
    <button>Add New MCQ</button>
</a>

{{range .}}
<div class="mcq">
    <p>
         <strong>Subject:</strong> {{.Subject}}
    </p>

    <h2>Q{{.ID}}. {{.Question}}</h2>

    <ul>
        {{range .Options}}
        <li>• {{.}}</li>
        {{end}}
    </ul>

    <p class="answer">
        Correct Answer: {{.Answer}}
    </p>

    <p class="description">
        Explanation: {{.Description}}
    </p>

</div>
{{end}}

</body>
</html>
